name: Post to Social Media

# NOTE: Automatic posting is handled by stagger-social.yml (one post/day).
# The push trigger was removed so editing posts / flipping publish_social does
# NOT mass-post everything at once. This workflow is now manual-only and posts
# ALL flagged articles in one batch — use it only for an intentional bulk send.
on:
  workflow_dispatch:
    inputs:
      post_all:
        description: 'Post ALL articles with publish_social: true (retroactive)'
        required: false
        type: boolean
        default: false

jobs:
  post-to-social:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect posts to process
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.post_all }}" = "true" ]; then
            echo "Manual trigger: posting ALL articles with publish_social flag"
            # List every post file in _posts/
            find _posts -name '*.md' -type f | sort > /tmp/changed_posts.txt
            echo "has_posts=true" >> $GITHUB_OUTPUT
            echo "Posts to process:"
            cat /tmp/changed_posts.txt
          else
            # Normal push: detect changed posts only
            CHANGED_POSTS=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- '_posts/*.md' || true)
            if [ -z "$CHANGED_POSTS" ]; then
              echo "No blog posts changed."
              echo "has_posts=false" >> $GITHUB_OUTPUT
            else
              echo "Changed posts:"
              echo "$CHANGED_POSTS"
              echo "$CHANGED_POSTS" > /tmp/changed_posts.txt
              echo "has_posts=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_posts == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.detect.outputs.has_posts == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Run social media posting script
        if: steps.detect.outputs.has_posts == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          SITE_URL: "https://secureroots.io"
        run: |
          python scripts/post_to_social.py /tmp/changed_posts.txt

      - name: Commit tracking file updates
        if: steps.detect.outputs.has_posts == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_urls.json
          git diff --cached --quiet || git commit -m "Update social media tracking [skip ci]"
          git push
