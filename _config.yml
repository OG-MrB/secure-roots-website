title: Secure Roots
description: Enterprise-grade cybersecurity expertise. From small businesses to government agencies — proven resilience you can build on.
baseurl: "" # leave empty for root
url: "https://secureroots.io"

# Build settings
future: true
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# jekyll-feed: generate the blog RSS at /feed.xml (limit newest 20)
feed:
  path: feed.xml
  posts_limit: 20

# Time zone
timezone: America/Los_Angeles
