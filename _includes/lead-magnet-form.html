<!--
  Reusable lead-magnet opt-in form.
  Usage: {% include lead-magnet-form.html source="hipaa" label="Get the HIPAA SRA Checklist" %}

  Status: the site-wide footer signup now runs on the real MailerLite form
  (see _layouts/default.html, ml-embedded div, form 16Q0dN). This per-vertical
  include still runs on FormSubmit because only that one generic MailerLite
  form exists so far. TODO (Eric, optional): if per-vertical tracking in
  MailerLite (separate group per checklist, not just the source tag FormSubmit
  already captures) is wanted, duplicate the MailerLite form four times, one
  per vertical, then swap each landing page's include to its own ml-embedded
  div the same way the footer was wired.
-->
<div class="lead-magnet-box">
  <form class="lead-magnet-form" action="https://formsubmit.co/info@secureroots.io" method="POST">
    <input type="hidden" name="_subject" value="Lead magnet signup: {{ include.source }}">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://secureroots.io/thank-you/">
    <input type="hidden" name="source" value="{{ include.source }}">
    <input type="email" name="email" placeholder="Your work email" required>
    <button type="submit" class="btn btn-large">{{ include.label | default: "Send Me the Checklist" }}</button>
  </form>
  <p class="lead-magnet-note">No spam, unsubscribe anytime. Reply STOP to any email to opt out.</p>
</div>
