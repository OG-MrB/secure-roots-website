<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.mailerlite.com https://groot.mailerlite.com https://assets.mlcdn.com https://static.mailerlite.com;
                 style-src 'self' 'unsafe-inline' https://assets.mailerlite.com https://assets.mlcdn.com https://fonts.mailerlite.com;
                 img-src 'self' data: https://assets.mailerlite.com https://assets.mlcdn.com;
                 connect-src 'self' https://assets.mailerlite.com https://api.mailerlite.com https://groot.mailerlite.com;
                 font-src 'self' https://assets.mlcdn.com https://fonts.mailerlite.com https://fonts.gstatic.com;
                 form-action https://formsubmit.co https://assets.mailerlite.com https://*.mailerlite.com">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/img/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/img/apple-touch-icon.png">
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico">
  {%- feed_meta -%}
  <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">
  <!-- MailerLite Universal -->
  <script>
    (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
    .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
    n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
    (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
    ml('account', '2506141');
  </script>
  <!-- End MailerLite Universal -->
</head>

<body>
  <!-- Header / Navigation -->
  <header>
    <nav class="navbar">
      <a href="{{ site.baseurl }}/" class="logo">
        <img src="{{ site.baseurl }}/img/secureroots_logo.png" alt="Secure Roots Logo" />
      </a>
      <div class="mobile-nav-toggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/services/">Services</a></li>
        <li><a href="{{ site.baseurl }}/blog/">Blog</a></li>
        <li><a href="{{ site.baseurl }}/community/">Community</a></li>
        <li><a href="{{ site.baseurl }}/wellness/">Wellness</a></li>
        <li><a href="{{ site.baseurl }}/contact/">Contact</a></li>
        <li><a href="{{ site.baseurl }}/contact/" class="nav-cta">Get Protected</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-newsletter">
        <div class="ml-embedded" data-form="16Q0dN"></div>
      </div>
      <div class="footer-links">
        <div class="social">
          <a href="https://www.linkedin.com/company/secure-roots/" target="_blank">LinkedIn</a>
          <a href="https://www.instagram.com/secure.roots/" target="_blank">Instagram</a>
          <a href="https://x.com/secureroots_og" target="_blank">Twitter</a>
        </div>
      </div>
    </div>
    <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved. &middot; <a href="{{ site.baseurl }}/privacy/">Privacy Policy</a></p>
  </footer>

  <script src="{{ site.baseurl }}/js/main.js"></script>
</body>

</html>
