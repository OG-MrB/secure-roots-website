<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1450"/>
      <stop offset="100%" style="stop-color:#7851a9"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cfb53b"/>
      <stop offset="100%" style="stop-color:#e8d066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#7851a9" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Org chart style layout representing criminal enterprise -->

  <!-- Top: "CEO" node -->
  <g transform="translate(600, 100)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#0d0620" stroke="#cfb53b" stroke-width="2"/>
    <!-- Crown icon -->
    <path d="M-15 -10 L-20 5 L-8 -2 L0 8 L8 -2 L20 5 L15 -10Z" fill="#cfb53b" opacity="0.8"/>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="11" fill="#cfb53b" text-anchor="middle" font-weight="bold">LEADERSHIP</text>
  </g>

  <!-- Vertical lines from CEO -->
  <line x1="600" y1="130" x2="600" y2="160" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="160" x2="300" y2="160" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="160" x2="900" y2="160" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="160" x2="300" y2="185" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="160" x2="600" y2="185" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>
  <line x1="900" y1="160" x2="900" y2="185" stroke="#7851a9" stroke-width="1.5" opacity="0.5"/>

  <!-- Department: Malware Dev -->
  <g transform="translate(300, 215)">
    <rect x="-80" y="-30" width="160" height="55" rx="6" fill="#0d0620" stroke="#7851a9" stroke-width="1.5"/>
    <!-- Code icon -->
    <text x="-20" y="-5" font-family="monospace" font-size="14" fill="#4ade80" opacity="0.8">&lt;/&gt;</text>
    <text x="25" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#aaa">DEV</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Malware R&amp;D</text>
  </g>

  <!-- Department: Operations -->
  <g transform="translate(600, 215)">
    <rect x="-80" y="-30" width="160" height="55" rx="6" fill="#0d0620" stroke="#7851a9" stroke-width="1.5"/>
    <!-- Target icon -->
    <circle cx="-20" cy="-5" r="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <circle cx="-20" cy="-5" r="3" fill="#ef4444" opacity="0.8"/>
    <text x="10" y="-2" font-family="Arial, sans-serif" font-size="10" fill="#aaa">OPS</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Attack Operations</text>
  </g>

  <!-- Department: Finance -->
  <g transform="translate(900, 215)">
    <rect x="-80" y="-30" width="160" height="55" rx="6" fill="#0d0620" stroke="#7851a9" stroke-width="1.5"/>
    <!-- Money icon -->
    <text x="-15" y="0" font-family="Arial, sans-serif" font-size="18" fill="#cfb53b" opacity="0.8">$</text>
    <text x="15" y="-2" font-family="Arial, sans-serif" font-size="10" fill="#aaa">FIN</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Ransom &amp; Laundering</text>
  </g>

  <!-- Lower tier connections -->
  <line x1="300" y1="240" x2="300" y2="275" stroke="#7851a9" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="240" x2="600" y2="275" stroke="#7851a9" stroke-width="1" opacity="0.4"/>
  <line x1="900" y1="240" x2="900" y2="275" stroke="#7851a9" stroke-width="1" opacity="0.4"/>

  <!-- Worker nodes -->
  <g opacity="0.6">
    <!-- Dev workers -->
    <circle cx="260" cy="295" r="15" fill="#0d0620" stroke="#4ade80" stroke-width="1"/>
    <circle cx="300" cy="295" r="15" fill="#0d0620" stroke="#4ade80" stroke-width="1"/>
    <circle cx="340" cy="295" r="15" fill="#0d0620" stroke="#4ade80" stroke-width="1"/>
    <!-- Worker icons -->
    <circle cx="260" cy="291" r="4" fill="#4ade80" opacity="0.5"/>
    <rect x="255" y="297" width="10" height="6" rx="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="300" cy="291" r="4" fill="#4ade80" opacity="0.5"/>
    <rect x="295" y="297" width="10" height="6" rx="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="340" cy="291" r="4" fill="#4ade80" opacity="0.5"/>
    <rect x="335" y="297" width="10" height="6" rx="2" fill="#4ade80" opacity="0.5"/>

    <!-- Ops workers -->
    <circle cx="560" cy="295" r="15" fill="#0d0620" stroke="#ef4444" stroke-width="1"/>
    <circle cx="600" cy="295" r="15" fill="#0d0620" stroke="#ef4444" stroke-width="1"/>
    <circle cx="640" cy="295" r="15" fill="#0d0620" stroke="#ef4444" stroke-width="1"/>
    <circle cx="560" cy="291" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="555" y="297" width="10" height="6" rx="2" fill="#ef4444" opacity="0.5"/>
    <circle cx="600" cy="291" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="595" y="297" width="10" height="6" rx="2" fill="#ef4444" opacity="0.5"/>
    <circle cx="640" cy="291" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="635" y="297" width="10" height="6" rx="2" fill="#ef4444" opacity="0.5"/>

    <!-- Finance workers -->
    <circle cx="860" cy="295" r="15" fill="#0d0620" stroke="#cfb53b" stroke-width="1"/>
    <circle cx="900" cy="295" r="15" fill="#0d0620" stroke="#cfb53b" stroke-width="1"/>
    <circle cx="940" cy="295" r="15" fill="#0d0620" stroke="#cfb53b" stroke-width="1"/>
    <circle cx="860" cy="291" r="4" fill="#cfb53b" opacity="0.5"/>
    <rect x="855" y="297" width="10" height="6" rx="2" fill="#cfb53b" opacity="0.5"/>
    <circle cx="900" cy="291" r="4" fill="#cfb53b" opacity="0.5"/>
    <rect x="895" y="297" width="10" height="6" rx="2" fill="#cfb53b" opacity="0.5"/>
    <circle cx="940" cy="291" r="4" fill="#cfb53b" opacity="0.5"/>
    <rect x="935" y="297" width="10" height="6" rx="2" fill="#cfb53b" opacity="0.5"/>
  </g>

  <!-- Revenue stats floating -->
  <g opacity="0.25" font-family="monospace" font-size="10">
    <text x="100" y="80" fill="#cfb53b">$10.5T annual</text>
    <text x="1020" y="80" fill="#cfb53b">ROI: 1425%</text>
    <text x="80" y="350" fill="#4ade80">CVE-2025-****</text>
    <text x="1010" y="350" fill="#4ade80">phishing_kit_v4</text>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#7851a9" stroke-width="1" opacity="0.15" fill="none">
    <path d="M0 420 H80 L110 390 H180"/>
    <path d="M1200 420 H1120 L1090 390 H1020"/>
    <circle cx="180" cy="390" r="3" fill="#7851a9"/>
    <circle cx="1020" cy="390" r="3" fill="#7851a9"/>
  </g>

  <!-- Title -->
  <text x="600" y="430" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="1">
    (CYBER) CRIMINALS HAVE JOBS TOO
  </text>

  <!-- Subtitle -->
  <text x="600" y="468" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#cfb53b" text-anchor="middle" letter-spacing="2">
    HOW CYBERCRIME BECAME A PROFESSIONAL INDUSTRY
  </text>

  <!-- Gold accent line -->
  <rect x="300" y="488" width="600" height="2" rx="1" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Branding -->
  <text x="600" y="520" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7851a9" text-anchor="middle" letter-spacing="3" opacity="0.7">
    SECUREROOTS.IO
  </text>
</svg>
